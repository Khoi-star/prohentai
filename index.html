<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm Kiếm Hentaiz</title>
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { text-align: center; width: 100%; margin-bottom: 20px; }
        input { 
            padding: 15px; 
            width: 100%; 
            max-width: 350px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #1e1e1e; 
            color: white; 
            font-size: 16px; 
            margin-bottom: 15px; 
            box-sizing: border-box;
        }
        button { 
            padding: 15px 30px; 
            width: 100%; 
            max-width: 350px; 
            background-color: #e91e63; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
        }
        #resultFrame {
            width: 100%;
            max-width: 800px;
            height: 70vh;
            border: 1px solid #333;
            border-radius: 10px;
            background: #fff; /* Nền trắng cho iframe */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hentaiz Search</h2>
    <input type="text" id="tagInput" placeholder="Nhập từ khóa...">
    <button onclick="openSearch()">Tìm kiếm</button>
</div>

<iframe id="resultFrame" title="Kết quả tìm kiếm"></iframe>

<script>
    function openSearch() {
        let input = document.getElementById('tagInput').value.trim();
        if (input === "") return alert("Vui lòng nhập từ khóa!");

        let query = input.replace(/\s+/g, '+');
        let url = `https://hentaiz.cool/browse?q=${query}`;
        
        // Gán URL vào iframe thay vì window.open
        document.getElementById('resultFrame').src = url;
    }
</script>

</body>
</html>
